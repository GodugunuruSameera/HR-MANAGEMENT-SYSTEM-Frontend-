<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>HRPro | Payroll</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="navbar"><h2>HR<span>Pro</span></h2>
      <div class="nav-links"><a href="index.html">Dashboard</a><a href="employees.html">Employees</a><a href="attendance.html">Attendance</a><a href="payroll.html" class="active">Payroll</a></div>
    </div>
  </header>
  <div class="container" style="display: flex; gap: 30px; flex-wrap: wrap;">
    <div class="card" style="flex: 1; min-width: 300px; border-top: 4px solid var(--success);">
      <h3>💸 Generate Salary Slip</h3>
      <form id="payrollForm" onsubmit="calculatePayroll(event)">
        <select id="payEmpSelect"></select>
        <input type="number" id="basicSalary" placeholder="Basic Salary (₹)">
        <div class="form-grid">
          <input type="number" id="allowances" placeholder="Allowances (₹)">
          <input type="number" id="deductions" placeholder="Deductions (₹)">
        </div>
        <button type="submit" style="background: var(--success);">Process Payment</button>
      </form>
    </div>
    <div style="flex: 1; min-width: 300px;">
      <h2 style="color: var(--primary); margin-bottom: 15px;">Recent Salary Slips</h2>
      <div id="payrollHistory"></div>
    </div>
  </div>
  <footer><p>© 2026 HRPro.</p></footer>
  <script src="js/data.js"></script><script src="js/payroll.js"></script><script src="js/auth.js"></script>
</body>
</html>
